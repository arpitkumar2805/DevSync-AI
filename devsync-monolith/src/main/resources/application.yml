server:
  port: 8080

spring:
  application:
    name: devsync-monolith

  datasource:
    url: jdbc:postgresql://localhost:5432/devsync_db
    username: devsync
    password: devsync_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/v1
      chat:
        options:
          model: llama3-8b-8192
          temperature: 0.7

# JWT Configuration
devsync:
  jwt:
    secret: ${JWT_SECRET:devSyncAiSuperSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong2024}
    access-token-expiration: 900000      # 15 minutes
    refresh-token-expiration: 604800000  # 7 days

  # AI Configuration (Groq with GPT-12B OSS)
  ai:
    provider: groq
    api-key: ${GROQ_API_KEY:}
    model: openai/gpt-12b-oss
    base-url: https://api.groq.com/openai/v1
    max-tokens: 2048
    temperature: 0.7

  # File upload configuration
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    allowed-types: image/jpeg,image/png,image/gif,application/pdf,text/plain,application/zip

  # Cache TTL
  cache:
    ttl: 600  # 10 minutes default

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    com.devsync: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
