server:
  port: 8086
spring:
  application:
    name: ai-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_db
    username: devsync
    password: devsync_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant
          temperature: 0.7
    retry:
      max-attempts: 1
devsync:
  jwt:
    secret: ${JWT_SECRET:devSyncAiSuperSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong2024}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
logging:
  level:
    com.devsync: DEBUG
