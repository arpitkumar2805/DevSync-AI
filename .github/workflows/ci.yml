name: DevSync AI CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devsync
          POSTGRES_PASSWORD: devsync_secret
          POSTGRES_DB: devsync_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build common module
        run: mvn clean install -pl devsync-common -DskipTests

      - name: Build and test auth-service
        run: mvn clean verify -pl devsync-auth-service -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/devsync_test_db
          SPRING_DATASOURCE_USERNAME: devsync
          SPRING_DATASOURCE_PASSWORD: devsync_secret
          SPRING_DATA_REDIS_HOST: localhost

      - name: Build and test org-user-service
        run: mvn clean verify -pl devsync-org-user-service -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/devsync_test_db
          SPRING_DATASOURCE_USERNAME: devsync
          SPRING_DATASOURCE_PASSWORD: devsync_secret

      - name: Build and test project-service
        run: mvn clean verify -pl devsync-project-service -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/devsync_test_db
          SPRING_DATASOURCE_USERNAME: devsync
          SPRING_DATASOURCE_PASSWORD: devsync_secret

      - name: Build and test task-service
        run: mvn clean verify -pl devsync-task-service -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/devsync_test_db
          SPRING_DATASOURCE_USERNAME: devsync
          SPRING_DATASOURCE_PASSWORD: devsync_secret
          SPRING_RABBITMQ_HOST: localhost

      - name: Build and test notification-service
        run: mvn clean verify -pl devsync-notification-service -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/devsync_test_db
          SPRING_DATASOURCE_USERNAME: devsync
          SPRING_DATASOURCE_PASSWORD: devsync_secret
          SPRING_RABBITMQ_HOST: localhost

      - name: Build and test ai-service
        run: mvn clean verify -pl devsync-ai-service -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/devsync_test_db
          SPRING_DATASOURCE_USERNAME: devsync
          SPRING_DATASOURCE_PASSWORD: devsync_secret

      - name: Build infrastructure services
        run: |
          mvn clean package -pl devsync-discovery-server -DskipTests
          mvn clean package -pl devsync-config-server -DskipTests
          mvn clean package -pl devsync-api-gateway -DskipTests

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all JARs
        run: mvn clean package -DskipTests

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.microservices.yml build

      - name: Verify Docker images
        run: docker images | grep devsync
